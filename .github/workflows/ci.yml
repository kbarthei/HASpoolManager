name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Fast gate — lint + typecheck + unit tests (<60s) ──────────
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:unit

  # ── Stage 2: Integration tests (per-worker SQLite, no services) ────────
  integration-tests:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  # ── Stage 3: E2e tests (addon stack + Docker nginx + Playwright) ───────
  # Runs on main push only — builds the HA addon standalone, starts nginx
  # container with the real nginx.conf, ingress simulator, then Playwright.
  # No secrets needed — everything is local SQLite + Docker.
  e2e-tests:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Pull nginx image
        run: docker pull nginx:alpine

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
