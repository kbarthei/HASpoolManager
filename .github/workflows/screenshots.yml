name: Screenshots

# Captures synthetic UI screenshots of every major page (dark/light x desktop/mobile)
# and commits them back to docs/screenshots/. The pictures are the canonical visual
# reference for docs and PR review.
#
# Triggers:
#   - Weekly (Monday 04:00 UTC) - refresh the baseline
#   - Manual (workflow_dispatch) - on demand from the Actions tab
#   - Push to main affecting UI code - keep docs in sync with shipped UI

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "scripts/capture-docs-screenshots.ts"
      - ".github/workflows/screenshots.yml"

concurrency:
  group: screenshots
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Pull nginx image
        run: docker pull nginx:alpine

      - name: Capture screenshots
        run: npm run screenshots:docs
        env:
          CI: true

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet docs/screenshots/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat docs/screenshots/ | head -50
          fi

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          git commit -m "docs: refresh UI screenshots [skip ci]"
          # Rebase onto any commits that landed on main while we were capturing
          # (e.g. the changelog bot). Retry the push a few times in case of races.
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            sleep $((attempt * 5))
          done
          echo "::error::failed to push after 3 rebase attempts"
          exit 1

      - name: Upload as artifact
        # Always upload so the screenshots are downloadable even if the
        # auto-commit step failed (e.g. due to a race with main).
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-screenshots
          path: docs/screenshots/
          retention-days: 90
