name: Changelog

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          echo "# Changelog" > /tmp/CHANGELOG.md
          echo "" >> /tmp/CHANGELOG.md

          current_month=""
          git log --format="%H|%ad|%s" --date=format:"%Y-%m" --no-merges | \
          while IFS='|' read -r hash date subject; do
            if [[ "$date" != "$current_month" ]]; then
              current_month="$date"
              month_label=$(date -d "${date}-01" "+%B %Y")
              echo "" >> /tmp/CHANGELOG.md
              echo "## $month_label" >> /tmp/CHANGELOG.md
              echo "" >> /tmp/CHANGELOG.md
            fi
            short="${hash:0:7}"
            msg=$(echo "$subject" | sed -E 's/^(feat|fix|docs|chore|test)(\([^)]*\))?: //')
            case "$subject" in
              feat:*|feat\(*) prefix="**feat:**" ;;
              fix:*|fix\(*)   prefix="**fix:**" ;;
              docs:*|docs\(*) prefix="**docs:**" ;;
              chore:*|chore\(*) prefix="**chore:**" ;;
              test:*|test\(*) prefix="**test:**" ;;
              *)              prefix="-" ;;
            esac
            echo "- ${prefix} ${msg} (\`${short}\`)" >> /tmp/CHANGELOG.md
          done

      - name: Update release with changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Append changelog to the existing release body
          gh release view "$TAG" --json body -q .body > /tmp/existing_body.txt 2>/dev/null || true
          cat /tmp/existing_body.txt /tmp/CHANGELOG.md > /tmp/combined.md
          gh release edit "$TAG" --notes-file /tmp/combined.md || true
