name: Changelog

on:
  push:
    branches: [main]

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate CHANGELOG.md
        run: |
          cat > CHANGELOG.md <<'HEADER'
          # Changelog

          All notable changes to HASpoolManager are documented here.
          Generated automatically from [conventional commits](https://www.conventionalcommits.org/).

          HEADER
          # Remove leading spaces from heredoc
          sed -i 's/^          //' CHANGELOG.md

          current_month=""
          git log --format="%H|%ad|%s" --date=format:"%Y-%m" --no-merges | \
          while IFS='|' read -r hash date subject; do
            if [[ "$date" != "$current_month" ]]; then
              current_month="$date"
              month_label=$(date -d "${date}-01" "+%B %Y")
              echo "" >> CHANGELOG.md
              echo "## $month_label" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
            fi
            short="${hash:0:7}"
            msg=$(echo "$subject" | sed -E 's/^(feat|fix|docs|chore|test)(\([^)]*\))?: //')
            case "$subject" in
              feat:*|feat\(*) prefix="**feat:**" ;;
              fix:*|fix\(*)   prefix="**fix:**" ;;
              docs:*|docs\(*) prefix="**docs:**" ;;
              chore:*|chore\(*) prefix="**chore:**" ;;
              test:*|test\(*) prefix="**test:**" ;;
              *)              prefix="-" ;;
            esac
            echo "- ${prefix} ${msg} (\`${short}\`)" >> CHANGELOG.md
          done

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "docs: regenerate CHANGELOG.md [skip ci]"
          git push
