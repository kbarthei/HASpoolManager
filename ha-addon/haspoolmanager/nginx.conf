worker_processes 1;
error_log /dev/stderr info;
pid /run/nginx/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /dev/stdout;

  sendfile on;
  keepalive_timeout 65;

  client_max_body_size 10m;
  client_body_buffer_size 1m;

  server {
    listen 3000 default_server;
    server_name _;

    # Full response buffering: HA's aiohttp ingress proxy can't reliably
    # stream chunked responses from Next.js, so we coalesce upstream
    # responses into a single Content-Length response before returning
    # them downstream.
    proxy_buffering on;
    proxy_buffer_size 256k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 512k;
    proxy_max_temp_file_size 0;
    chunked_transfer_encoding off;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Ingress-Path $http_x_ingress_path;
    proxy_set_header Connection "";
    proxy_set_header Accept-Encoding "";

    # Next.js emits a `Link:` HTTP header for font preloads with paths
    # like `</ingress/_next/static/media/...woff2>; rel=preload`. The
    # browser parses this header before any JS runs, and the path can't
    # be rewritten with sub_filter (which only touches response bodies).
    # The font still loads via CSS @font-face, so we just strip the
    # header. We lose the preload optimization (irrelevant on a LAN
    # addon) but eliminate the 404s.
    proxy_hide_header link;

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;

    # ─── Path Rewriting Strategy ────────────────────────────────────────
    # Next.js is built with basePath=/ingress (when HA_ADDON=true) so it
    # serves everything under /ingress/*. HA strips its session prefix
    # before forwarding, so inbound paths look like:
    #   GET /                          (initial iframe load — no basePath)
    #   GET /ingress/_next/static/...  (subresources — already prefixed via sub_filter)
    #   GET /ingress/spools            (navigation within SPA)
    #
    # We rewrite the raw `/` root request to `/ingress/` so Next.js
    # finds it. Everything else is passed through as-is.

    # ── HTML response rewriting ─────────────────────────────────────────
    # Inject session prefix into all absolute URLs emitted by Next.js so
    # the browser routes subsequent requests back through HA ingress.
    set $ip $http_x_ingress_path;
    sub_filter_once off;
    # text/html is rewritten by default. application/javascript covers
    # client chunks. text/x-component is the MIME for RSC streaming
    # responses, which embed client-reference-manifest chunk paths as
    # raw strings — those need rewriting too.
    sub_filter_types application/javascript text/x-component application/json text/css;
    sub_filter '/ingress/_next/'         '$ip/ingress/_next/';
    # client-reference-manifest embeds raw chunk paths in RSC responses
    sub_filter '"/ingress/_next/static'  '"$ip/ingress/_next/static';
    sub_filter '/ingress/api/'           '$ip/ingress/api/';
    sub_filter 'href="/ingress/'         'href="$ip/ingress/';
    sub_filter '"/ingress/spools'        '"$ip/ingress/spools';
    sub_filter '"/ingress/inventory'     '"$ip/ingress/inventory';
    sub_filter '"/ingress/orders'        '"$ip/ingress/orders';
    sub_filter '"/ingress/prints'        '"$ip/ingress/prints';
    sub_filter '"/ingress/history'       '"$ip/ingress/history';
    sub_filter '"/ingress/admin'         '"$ip/ingress/admin';
    sub_filter '"/ingress/storage'       '"$ip/ingress/storage';
    sub_filter '"/ingress/scan'          '"$ip/ingress/scan';
    sub_filter '"/ingress/ams'           '"$ip/ingress/ams';
    sub_filter '"/ingress/favicon'       '"$ip/ingress/favicon';
    # Next.js client router stores basePath as literal "/ingress" in a JS
    # chunk (let n="/ingress"). After hydration the router prepends this
    # to every Link href, bypassing all the more specific sub_filter rules
    # above. Rewrite the bare string so the runtime basePath becomes the
    # full HA ingress prefix.
    sub_filter '"/ingress"'              '"$ip/ingress"';
    # Turbopack chunk loader stores its own asset base as a literal
    # "/ingress/_next/" string (let t="/ingress/_next/"). It is NOT the
    # same as Next.js's basePath constant — it's used by the runtime
    # ChunkLoader for dynamic imports and font files.
    sub_filter '"/ingress/_next/"'       '"$ip/ingress/_next/"';

    # Inject runtime URL patcher so client-side router.push, fetch, and
    # RSC requests that build URLs from JS string constants also pick up
    # the session prefix.
    sub_filter '<head>' '<head><script>(function(){var m=window.location.pathname.match(/^(\/api\/hassio_ingress\/[^\/]+)/);if(!m)return;var p=m[1];window.__INGRESS_PREFIX__=p;if(window.location.pathname.indexOf(p+"/ingress")!==0){var sfx=window.location.pathname.slice(p.length)||"/";if(sfx==="/")sfx="";history.replaceState(null,"",p+"/ingress"+sfx+window.location.search+window.location.hash);}var op=history.pushState;history.pushState=function(s,t,u){if(typeof u==="string"&&u.charAt(0)==="/"&&u.indexOf(p)!==0)u=p+u;return op.call(this,s,t,u);};var or=history.replaceState;history.replaceState=function(s,t,u){if(typeof u==="string"&&u.charAt(0)==="/"&&u.indexOf(p)!==0)u=p+u;return or.call(this,s,t,u);};var of=window.fetch;window.fetch=function(i,n){try{if(typeof i==="string"&&i.charAt(0)==="/"&&i.indexOf(p)!==0)i=p+i;else if(i&&i.url){var u=new URL(i.url,window.location.origin);if(u.pathname.charAt(0)==="/"&&u.pathname.indexOf(p)!==0){u.pathname=p+u.pathname;i=new Request(u.toString(),i);}}}catch(e){}return of.call(this,i,n);};})();</script>';

    # Rewrite any upstream Location header so that redirects picked up by
    # the browser also include the HA ingress session prefix.
    proxy_redirect ~^/(.*)$ $http_x_ingress_path/$1;

    # ── Root path: Next.js with basePath=/ingress canonicalises /ingress/
    # as /ingress (no trailing slash). Forward to that canonical form to
    # avoid an unnecessary 308 redirect chain.
    location = / {
      proxy_pass http://127.0.0.1:3001/ingress;
    }

    # ── /api/* shortcut ─────────────────────────────────────────────────
    # Next.js is built with basePath=/ingress, so its API routes live at
    # /ingress/api/v1/*. But HA Core's rest_command POSTs directly to
    # http://local-haspoolmanager:3000/api/v1/events/printer-sync (no
    # ingress prefix, no sub_filter rewriting — it's a server-to-server
    # HTTP call). Similarly, the admin page fetches /api/v1/admin/sync-log
    # from the browser, and the URL gets forwarded through HA ingress
    # without the basePath prefix. Rewrite /api/ → /ingress/api/ so both
    # paths reach Next.js at its real location.
    location /api/ {
      proxy_pass http://127.0.0.1:3001/ingress/api/;
    }

    # ── All other paths: pass through ────────────────────────────────────
    location / {
      proxy_pass http://127.0.0.1:3001;
    }
  }
}
