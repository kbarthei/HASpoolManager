name: HASpoolManager
version: "1.1.19"
slug: haspoolmanager
description: "3D Printing Filament Lifecycle Manager"
url: "https://github.com/kbarthei/HASpoolManager"
arch:
  - aarch64
  - amd64
startup: application
init: false
ingress: true
ingress_port: 3000
homeassistant_api: true
hassio_api: true
host_network: false
ports:
  3001/tcp: 3001
ports_description:
  3001/tcp: "Web UI (direct access, no HA login needed)"
panel_icon: "mdi:printer-3d"
panel_title: "Spool Manager"
map:
  - config:rw
options:
  log_level: info
  anthropic_api_key: ""
  api_key: ""
schema:
  log_level: "list(debug|info|warning|error)"
  anthropic_api_key: "str?"
  api_key: "str?"
